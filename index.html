<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER TOOL HUB ⚡ - 4 Advanced Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="main-container">
        <!-- Header with Cyber Style -->
        <div class="cyber-header">
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="⚡ CYBER TOOL HUB ⚡">⚡ CYBER TOOL HUB ⚡</h1>
            </div>
            <p class="cyber-subtitle">>_ 4 Advanced Tools in One Place_</p>
            <div class="cyber-decoration">
                <span class="line"></span>
                <span class="circle"></span>
                <span class="line"></span>
            </div>
        </div>

        <!-- Telegram Bot Info with Neon Effect -->
        <div class="telegram-info">
            <div class="neon-card">
                <div class="neon-icon">
                    <i class="fab fa-telegram"></i>
                </div>
                <div class="neon-content">
                    <div class="neon-item">
                        <span class="neon-label">🤖 BOT :</span>
                        <a href="https://t.me/Darknet_cen3bot" target="_blank" class="neon-link">
                            <i class="fab fa-telegram"></i> @Darknet_cen3bot
                        </a>
                    </div>
                    <div class="neon-item">
                        <span class="neon-label">👑 OWNER :</span>
                        <a href="https://t.me/TH3Cen_cee" target="_blank" class="neon-link owner">
                            <i class="fas fa-crown"></i> @TH3Cen_cee
                        </a>
                    </div>
                </div>
                <div class="neon-pulse"></div>
            </div>
        </div>

        <!-- Cyber Menu Bar -->
        <div class="cyber-menu">
            <button class="cyber-btn active" onclick="showTool('ip')" id="menu-ip">
                <span class="btn-icon">🌐</span>
                <span class="btn-text">IP LOOKUP</span>
                <span class="btn-glitch"></span>
            </button>
            <button class="cyber-btn" onclick="showTool('url')" id="menu-url">
                <span class="btn-icon">🔗</span>
                <span class="btn-text">URL SHORTENER</span>
                <span class="btn-glitch"></span>
            </button>
            <button class="cyber-btn" onclick="showTool('lyrics')" id="menu-lyrics">
                <span class="btn-icon">🎵</span>
                <span class="btn-text">LYRICS FINDER</span>
                <span class="btn-glitch"></span>
            </button>
            <button class="cyber-btn" onclick="showTool('gmail')" id="menu-gmail">
                <span class="btn-icon">📧</span>
                <span class="btn-text">GMAIL GENERATOR</span>
                <span class="btn-glitch"></span>
            </button>
        </div>

        <!-- Tool Container with Glass Effect -->
        <div class="glass-container" id="toolContainer">
            <!-- Tools will be loaded here dynamically -->
        </div>

        <!-- Cyber Footer -->
        <div class="cyber-footer">
            <div class="footer-scanner"></div>
            <p>⚡ DEVELOPED BY <span class="neon-text">@TH3Cen_cee</span> ⚡</p>
            <div class="footer-stats">
                <span class="stat"><i class="fas fa-bolt"></i> 4 TOOLS</span>
                <span class="stat"><i class="fas fa-shield-alt"></i> SECURE</span>
                <span class="stat"><i class="fas fa-infinity"></i> FREE</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
